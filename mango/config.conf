# More option see https://github.com/DreamMaoMao/mango/wiki/

# Window effect
source=./window_effect.conf


# Animation Configuration(support type:zoom,slide)
source=./animation.conf

# Layout Settings
source=./layout.conf

# Overview Setting
hotarea_size=10
enable_hotarea=1
ov_tab_mode=0
overviewgappi=5
overviewgappo=30

# Misc
no_border_when_single=0
axis_bind_apply_timeout=100
focus_on_activate=1
idleinhibit_ignore_visible=0
sloppyfocus=1
warpcursor=1
focus_cross_monitor=0
focus_cross_tag=0
enable_floating_snap=0
snap_distance=30
cursor_size=24
drag_tile_to_tile=1

# keyboard
source=./keyboard.conf

# mouse
source=./mouse.conf

# Appearance
source=./appearance.conf

# tags
source=./tags.conf

# Axis Bindings
axisbind=SUPER,UP,viewtoleft_have_client
axisbind=SUPER,DOWN,viewtoright_have_client

# layer rule
layerrule=animation_type_open:zoom,layer_name:rofi
layerrule=animation_type_close:zoom,layer_name:rofi

# start up
source=./start_up.conf

# This sources the noctalia theme
source=./noctalia.conf


# This sources the noctalia theme

source = /home/david/.config/mango/noctalia.conf

